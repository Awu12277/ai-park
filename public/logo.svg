<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 渐变背景圆 -->
  <circle cx="100" cy="85" r="55" fill="url(#mainGrad)" opacity="0.15"/>
  <circle cx="100" cy="85" r="40" fill="url(#mainGrad)" opacity="0.2"/>

  <!-- 字母 A 变形为公园/AI元素 -->
  <g filter="url(#softGlow)">
    <path d="M60 130 L80 50 L85 50 L100 130" fill="none" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M100 130 L115 50 L120 50 L140 130" fill="none" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- AI 连接线 -->
    <circle cx="80" cy="70" r="4" fill="#60a5fa"/>
    <circle cx="100" cy="55" r="5" fill="#818cf8"/>
    <circle cx="120" cy="70" r="4" fill="#60a5fa"/>
    <circle cx="100" cy="85" r="3" fill="#38bdf8"/>

    <line x1="80" y1="70" x2="100" y2="55" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="55" x2="120" y2="70" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
    <line x1="80" y1="70" x2="100" y2="85" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="70" x2="100" y2="85" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- 横杠 -->
  <line x1="72" y1="105" x2="128" y2="105" stroke="url(#mainGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 底部装饰 -->
  <path d="M45 145 Q100 135 155 145" fill="none" stroke="url(#mainGrad)" stroke-width="2" opacity="0.4"/>

  <!-- 文字 -->
  <text x="100" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="url(#textGrad)">AI PARK</text>
</svg>
